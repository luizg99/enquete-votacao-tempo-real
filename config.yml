# =============================================================================
# Task Question — Configuração e Estrutura de Dados
# =============================================================================
# Este arquivo documenta a arquitetura de dados da aplicação Task Question.
# Serve como referência para desenvolvedores e pode ser utilizado em futuras
# integrações com CI/CD (GitHub Actions) para injetar dados mock em demos.
#
# Extensão: .yml (equivalente a .yaml). Usamos .yml para brevidade.
# =============================================================================

app:
  name: "Task Question"
  version: "1.0.0-mvp"
  storage:
    type: "localStorage"
    key: "taskq:v1"
    description: "Persistência apenas no navegador. Sem backend."
  realtime:
    strategy: "polling + storage event"
    poll_interval_ms: 1000
    cross_tab_sync: true
    cross_device_sync: false

# -----------------------------------------------------------------------------
# Estrutura de dados
# -----------------------------------------------------------------------------
schema:

  survey:
    description: "Enquete: agrupa várias perguntas."
    fields:
      id: "string — identificador único (prefixo 'srv_')"
      title: "string — descrição/cabeçalho da enquete"
      createdAt: "number — timestamp em milissegundos (Date.now())"
      questions: "array<Question>"

  question:
    description: "Pergunta dentro de uma enquete."
    fields:
      id: "string — identificador único (prefixo 'q_')"
      text: "string — enunciado da pergunta"
      answers: "array<Answer>"

  answer:
    description: "Opção de resposta (radio) para uma pergunta."
    fields:
      id: "string — identificador único (prefixo 'a_')"
      text: "string — texto da resposta"
      votes: "number — contador agregado de votos"

  vote:
    description: "Registro histórico de cada voto individual."
    fields:
      surveyId: "string"
      questionId: "string"
      answerId: "string"
      ts: "number — timestamp do voto"

# -----------------------------------------------------------------------------
# Fluxo de votação (ponta a ponta)
# -----------------------------------------------------------------------------
flow:
  - step: 1
    actor: admin
    action: "Cria enquete em #/admin"
  - step: 2
    actor: admin
    action: "Adiciona perguntas e respostas (autosave)"
  - step: 3
    actor: admin
    action: "Acessa #/dashboard e clica 'QR Code Votação'"
  - step: 4
    actor: usuario
    action: "Escaneia QR → abre #/vote/:surveyId"
  - step: 5
    actor: usuario
    action: "Responde perguntas uma por vez → submete"
  - step: 6
    actor: gestor
    action: "Abre #/track/:surveyId e acompanha gráficos em tempo real"

# -----------------------------------------------------------------------------
# Rotas da aplicação (hash-based)
# -----------------------------------------------------------------------------
routes:
  - path: "#/admin"
    view: admin
    purpose: "CRUD de enquetes"
  - path: "#/dashboard"
    view: dashboard
    purpose: "Lista enquetes com acesso a QR e Acompanhamento"
  - path: "#/vote/:surveyId"
    view: vote
    purpose: "Tela do usuário para responder"
  - path: "#/qr/:surveyId"
    view: qr
    purpose: "QR code em tela cheia apontando para a rota de voto"
  - path: "#/track/:surveyId"
    view: track
    purpose: "Dashboard em tempo real com gráficos"

# -----------------------------------------------------------------------------
# Exemplo de enquete populada (mock)
# -----------------------------------------------------------------------------
example:
  surveys:
    - id: "srv_demo01"
      title: "Satisfação do evento de abertura"
      createdAt: 1713100000000
      questions:
        - id: "q_1"
          text: "Como você avalia a palestra inicial?"
          answers:
            - { id: "a_1", text: "Excelente", votes: 12 }
            - { id: "a_2", text: "Boa",       votes: 8 }
            - { id: "a_3", text: "Regular",   votes: 3 }
            - { id: "a_4", text: "Ruim",      votes: 1 }
        - id: "q_2"
          text: "A infraestrutura do local atendeu bem?"
          answers:
            - { id: "a_5", text: "Sim, plenamente", votes: 15 }
            - { id: "a_6", text: "Parcialmente",    votes: 7 }
            - { id: "a_7", text: "Não",             votes: 2 }
  votes:
    - { surveyId: "srv_demo01", questionId: "q_1", answerId: "a_1", ts: 1713100050000 }
    - { surveyId: "srv_demo01", questionId: "q_2", answerId: "a_5", ts: 1713100051000 }
